<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Video Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Press Start 2P', system-ui;
            margin: 0;
            padding: 20px;
            text-align: center;
            line-height: 1.5;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #ffffff;
            margin-bottom: 30px;
        }
        
        input, button, select {
            background: #111;
            border: 3px solid #00ff00;
            color: #00ff00;
            padding: 15px;
            font-family: 'Press Start 2P';
            font-size: 16px;
            margin: 10px;
        }
        
        input {
            width: 70%;
            max-width: 500px;
        }
        
        button {
            cursor: pointer;
            background: #002200;
            color: #00ff00;
            border-color: #00ff00;
        }
        
        button:hover {
            background: #004400;
            box-shadow: 0 0 15px #00ff00;
        }
        
        .video-container {
            margin: 30px auto;
            max-width: 800px;
            background: #000;
            padding: 10px;
            border: 4px solid #00ffff;
        }
        
        iframe {
            width: 100%;
            height: 450px;
            border: none;
        }
        
        .history {
            margin-top: 40px;
            text-align: left;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .link {
            color: #00ffff;
            text-decoration: underline;
            cursor: pointer;
            word-break: break-all;
        }
        
        .warning {
            color: #ffff00;
            font-size: 13px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SCHOOL VIDEO PLAYER</h1>
        <p class="subtitle">Watch YouTube Videos</p>
        
        <input type="text" id="urlInput" placeholder="Paste YouTube URL or Video ID here" autocomplete="off">
        <button onclick="loadVideo()">PLAY VIDEO</button>
        
        <div style="margin: 20px;">
            <select id="proxySelect">
                <option value="invidious">Invidious (Recommended)</option>
                <option value="piped">Piped</option>
                <option value="embed">Standard Embed</option>
            </select>
        </div>
        
        <div class="video-container" id="videoArea" style="display:none;">
            <iframe id="player" allowfullscreen></iframe>
        </div>
        
        <div class="warning">
            If the video does not load, try a different option from the dropdown.<br>
            Proxies may stop working over time.
        </div>
        
        <div class="history">
            <h2 style="color:#00ffff;">Recently Watched</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('ytHistory') || '[]');
        
        function saveToHistory(title, url) {
            history.unshift({title, url});
            if (history.length > 10) history.pop();
            localStorage.setItem('ytHistory', JSON.stringify(history));
            renderHistory();
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.innerHTML = `<span class="link" onclick="directLoad('${item.url}')">${item.title}</span>`;
                list.appendChild(div);
            });
        }
        
        function extractVideoId(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return match && match[2].length === 11 ? match[2] : url.trim();
        }
        
        function loadVideo() {
            const input = document.getElementById('urlInput').value.trim();
            if (!input) return;
            
            const videoId = extractVideoId(input);
            const proxy = document.getElementById('proxySelect').value;
            
            let embedUrl = '';
            
            if (proxy === 'invidious') {
                const instances = [
                    'https://yewtu.be',
                    'https://inv.nadeko.net',
                    'https://invidious.io',
                    'https://yt.drgnz.club'
                ];
                const randomInstance = instances[Math.floor(Math.random() * instances.length)];
                embedUrl = `${randomInstance}/embed/${videoId}`;
            } 
            else if (proxy === 'piped') {
                embedUrl = `https://piped.video/embed/${videoId}`;
            } 
            else {
                embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}`;
            }
            
            const iframe = document.getElementById('player');
            iframe.src = embedUrl;
            document.getElementById('videoArea').style.display = 'block';
            
            saveToHistory(`Video ${videoId.substring(0,6)}...`, input);
        }
        
        function directLoad(url) {
            document.getElementById('urlInput').value = url;
            loadVideo();
        }
        
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadVideo();
        });
        
        renderHistory();
    </script>
</body>
</html>
